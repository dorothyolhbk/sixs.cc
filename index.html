<html lang="zh-CN">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性福导航</title>
	
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
            perspective: 1000px;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            z-index: 100;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00c6ff, #0072ff, #9400d3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header p {
            color: #a0a0a0;
            font-size: 1rem;
        }

        .gallery {
            width: 90%;
            max-width: 1200px;
            margin: 100px auto 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            position: relative;
            z-index: 10;
        }

        .image-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .image-container {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transform-style: preserve-3d;
            animation: flyIn 1s ease-out forwards;
            opacity: 0;
            transition: transform 0.3s ease;
            padding-bottom: 75%;
            height: 0;
        }

        .image-container:hover {
            transform: translateY(-5px);
        }

        .image-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.5s ease;
        }

        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            padding: 15px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .image-link:hover .image-overlay {
            transform: translateY(0);
        }

        .image-link:hover img {
            transform: scale(1.05);
        }

        .image-title {
            font-size: 1rem;
            margin-bottom: 5px;
            color: #ffffff;
        }

        .image-description {
            font-size: 0.8rem;
            color: #a0a0a0;
        }

        .icons-section {
            width: 100%;
            margin: 60px auto;
            position: relative;
            z-index: 10;
        }

        .icons-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .icon-column {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
            padding: 0 10px;
        }

        .icon-link {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 10px;
            transition: transform 0.3s ease;
        }

        .icon-item {
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            opacity: 0;
            overflow: hidden;
            position: relative;
            padding: 10px;
            margin-bottom: 10px;
        }

        .icon-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
            border-radius: 50%;
        }

        .icon-text {
            font-size: 0.8rem;
            text-align: center;
            color: #ffffff;
            transition: color 0.3s ease;
        }

        .icon-link:hover {
            transform: translateY(-5px);
        }

        .icon-link:hover .icon-item {
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            background: linear-gradient(135deg, #2a5298, #1e3c72);
        }

        .icon-link:hover .icon-item img {
            transform: scale(1.1);
        }

        .icon-link:hover .icon-text {
            color: #00c6ff;
        }

        .icon-left {
            animation: slideInLeft 0.8s ease-out forwards;
        }

        .icon-right {
            animation: slideInRight 0.8s ease-out forwards;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }

        .loading-text {
            font-size: 1.5rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .loading-bar {
            width: 200px;
            height: 4px;
            background-color: #333;
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-progress {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            border-radius: 2px;
            animation: loading 2s ease-out forwards;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            opacity: 0;
            animation: floatUp 10s linear infinite;
        }

        @keyframes flyIn {
            0% {
                opacity: 0;
                transform: translateZ(-1000px) rotateY(45deg);
            }
            70% {
                opacity: 1;
                transform: translateZ(50px) rotateY(-5deg);
            }
            100% {
                opacity: 1;
                transform: translateZ(0) rotateY(0);
            }
        }

        @keyframes slideInLeft {
            0% {
                opacity: 0;
                transform: translateX(-100px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            0% {
                opacity: 0;
                transform: translateX(100px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes loading {
            0% {
                width: 0;
            }
            100% {
                width: 100%;
            }
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(100%) scale(0);
            }
            10% {
                opacity: 1;
                transform: translateY(90%) scale(1);
            }
            90% {
                opacity: 1;
                transform: translateY(-90%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100%) scale(0);
            }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
            
            .image-container {
                padding-bottom: 75%;
            }
            
            .icon-column {
                padding: 0 5px;
            }
            
            .icon-link {
                padding: 10px 5px;
            }
            
            .icon-item {
                padding: 8px;
                margin-bottom: 8px;
            }
            
            .icon-text {
                font-size: 0.7rem;
            }
        }
    </style>
